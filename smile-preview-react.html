<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smile Preview (React) — SmileVista</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', sans-serif; background: #F8F7F4; }
  .slider-thumb::-webkit-slider-thumb { -webkit-appearance: none; width: 4px; height: 600px; background: white; cursor: ew-resize; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
  .pulse-border { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  @keyframes pulse { 0%, 100% { border-color: #3E7A52; } 50% { border-color: #C9A24A; } }
</style>
</head>
<body class="p-6 md:p-12">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const App = () => {
  const [file, setFile] = useState(null);
  const [stage, setStage] = useState('idle'); // idle, processing, result
  const [sliderVal, setSliderVal] = useState(50);
  const [analysis, setAnalysis] = useState(null);
  const canvasRef = useRef(null);

  const handleUpload = (e) => {
    const uploadedFile = e.target.files[0];
    if (uploadedFile) {
      const reader = new FileReader();
      reader.onload = (event) => {
        setFile(event.target.result);
        startSimulation();
      };
      reader.readAsDataURL(uploadedFile);
    }
  };

  const startSimulation = async () => {
    setStage('processing');
    const steps = [
      "Initializing Neural Engine...",
      "Detecting Facial Landmarks...",
      "Isolating Smile Region...",
      "Applying Whitening Algorithm...",
      "Finalizing Render..."
    ];
    
    for (let step of steps) {
      setAnalysis(step);
      await new Promise(r => setTimeout(r, 600));
    }
    
    setStage('result');
  };

  const reset = () => {
    setFile(null);
    setStage('idle');
    setAnalysis(null);
  };

  return (
    <div className="max-w-4xl mx-auto">
      <header className="mb-12 text-center">
        <h1 className="text-4xl font-bold text-[#1E3D26] mb-4">SmileVista <span className="text-[#3E7A52]">AI Preview</span></h1>
        <p className="text-gray-500">Experience your future smile using our proprietary React-driven AI simulator.</p>
      </header>

      <main className="bg-white rounded-[32px] p-8 md:p-12 shadow-2xl shadow-emerald-900/5">
        {stage === 'idle' && (
          <div 
            onClick={() => document.getElementById('pick').click()}
            className="border-2 border-dashed border-gray-200 rounded-3xl p-12 text-center cursor-pointer hover:border-[#3E7A52] hover:bg-emerald-50/30 transition-all group"
          >
            <div className="text-6xl mb-6 group-hover:scale-110 transition-transform">📸</div>
            <h3 className="text-2xl font-bold text-gray-800 mb-2">Upload Face Photo</h3>
            <p className="text-gray-500 mb-6">Drop your image here or tap to browse</p>
            <button className="bg-[#3E7A52] text-white px-8 py-3 rounded-xl font-semibold hover:bg-[#2F5D3A] transition-colors">Select From Device</button>
            <input type="file" id="pick" className="hidden" accept="image/*" onChange={handleUpload} />
          </div>
        )}

        {stage === 'processing' && (
          <div className="text-center py-20">
            <div className="relative w-48 h-48 mx-auto mb-12">
               <img src={file} className="w-full h-full object-cover rounded-full opacity-40" />
               <div className="absolute inset-0 border-4 border-[#3E7A52] rounded-full pulse-border"></div>
               <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-4 h-4 bg-[#C9A24A] rounded-full animate-ping"></div>
               </div>
            </div>
            <h3 className="text-2xl font-bold text-[#1E3D26] mb-2">{analysis}</h3>
            <div className="max-w-xs mx-auto h-1.5 bg-gray-100 rounded-full overflow-hidden">
               <div className="h-full bg-gradient-to-r from-[#3E7A52] to-[#C9A24A] animate-[progress_3s_ease-in-out_infinite]"></div>
            </div>
          </div>
        )}

        {stage === 'result' && (
          <div className="fade-in">
            <div className="relative aspect-[4/3] rounded-3xl overflow-hidden bg-black shadow-inner">
               {/* Before Image */}
               <img src={file} className="absolute inset-0 w-full h-full object-cover" />
               
               {/* After Image with Filter */}
               <div 
                className="absolute inset-0 w-full h-full"
                style={{ clipPath: `inset(0 ${100 - sliderVal}% 0 0)` }}
               >
                 <img 
                  src={file} 
                  className="w-full h-full object-cover brightness-110 contrast-110 saturate-[0.9] blur-[0.2px] drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]" 
                 />
                 <div className="absolute top-4 left-4 bg-[#C9A24A] text-white text-[10px] uppercase font-bold px-3 py-1 rounded-full shadow-lg">AI Simulation Applied</div>
               </div>

               {/* Labels */}
               <div className="absolute bottom-6 left-6 text-white text-xs font-bold uppercase tracking-wider bg-black/40 backdrop-blur-sm px-4 py-2 rounded-lg">Original</div>
               <div className="absolute bottom-6 right-6 text-white text-xs font-bold uppercase tracking-wider bg-[#3E7A52]/80 backdrop-blur-sm px-4 py-2 rounded-lg">After Treatment</div>

               {/* Slider Handle */}
               <input 
                type="range" 
                min="0" 
                max="100" 
                value={sliderVal} 
                onChange={(e) => setSliderVal(e.target.value)}
                className="absolute inset-0 w-full h-full appearance-none bg-transparent cursor-pointer z-50 slider-thumb"
               />
            </div>

            <div className="grid grid-cols-3 gap-6 mt-12">
               <div className="bg-gray-50 p-6 rounded-2xl">
                  <span className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1 block">Aesthetic Score</span>
                  <div className="text-2xl font-bold text-[#3E7A52]">98.2%</div>
               </div>
               <div className="bg-gray-50 p-6 rounded-2xl">
                  <span className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1 block">Confidence Inc.</span>
                  <div className="text-2xl font-bold text-[#C9A24A]">+42%</div>
               </div>
               <div className="bg-gray-50 p-6 rounded-2xl">
                  <span className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1 block">Recommendation</span>
                  <div className="text-sm font-bold text-[#1E3D26]">Veneers + Whitening</div>
               </div>
            </div>

            <div className="flex flex-col md:flex-row gap-4 mt-12">
               <button className="flex-1 bg-[#3E7A52] text-white py-4 rounded-xl font-bold hover:shadow-xl hover:shadow-emerald-900/10 transition-all flex items-center justify-center gap-2">
                 <span>📲</span> Send to Dr. on WhatsApp
               </button>
               <button className="flex-1 bg-white border-2 border-gray-100 text-[#1E3D26] py-4 rounded-xl font-bold hover:border-[#3E7A52] transition-all">
                 Download Preview
               </button>
               <button 
                onClick={reset}
                className="w-full md:w-auto bg-gray-100 text-gray-400 px-6 py-4 rounded-xl font-bold hover:text-red-500 transition-all"
               >
                 Reset
               </button>
            </div>
            
            <p className="mt-8 text-center text-xs text-gray-400">* This is an AI-generated simulation. Actual clinical results may vary. Consult your specialist for a definitive plan.</p>
          </div>
        )}
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<style>
@keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
.fade-in { animation: fadeIn 0.8s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>

</body>
</html>
