<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Assessment — SmileVista Dental</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #3E7A52;
            --dk: #2F5D3A;
            --deep: #1E3D26;
            --mint: #C9A24A;
            --bg: #F8F7F4;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: #1F2937;
            overflow-x: hidden;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .btn-p {
            background-color: var(--teal);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-p:hover {
            background-color: var(--dk);
            transform: translateY(-2px);
        }
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-bar {
            height: 6px;
            background-color: #E5E7EB;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--teal), var(--mint));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(62, 122, 82, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div id="root" class="w-full max-w-2xl relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const questions = [
            {
                id: 1,
                text: "What concerns you most about your smile?",
                options: [
                    { label: "Gaps between teeth", value: "gaps", icon: "🦷" },
                    { label: "Crowded or crooked teeth", value: "crowding", icon: "🧬" },
                    { label: "One or more missing teeth", value: "missing", icon: "✨" },
                    { label: "Discolored or yellow teeth", value: "color", icon: "💎" },
                    { label: "Pain or jaw discomfort", value: "pain", icon: "⚠️" }
                ]
            },
            {
                id: 2,
                text: "Have you ever had braces or aligners in the past?",
                options: [
                    { label: "Yes, once", value: "yes" },
                    { label: "Multiple times", value: "multi" },
                    { label: "Never had them", value: "no" }
                ]
            },
            {
                id: 3,
                text: "How much does your smile affect your confidence?",
                type: "scale",
                min: 1,
                max: 10,
                labels: ["Not at all", "Extremely"]
            },
            {
                id: 4,
                text: "Would you prefer a permanent solution (like implants) over removable ones?",
                options: [
                    { label: "Yes, definitely", value: "yes" },
                    { label: "Exploring both options", value: "maybe" },
                    { label: "No, prefer removable", value: "no" },
                    { label: "Not applicable", value: "na" }
                ]
            },
            {
                id: 5,
                text: "Do you experience pain while chewing or opening wide?",
                options: [
                    { label: "Frequently", value: "yes_freq" },
                    { label: "Occasionally", value: "yes_occ" },
                    { label: "Never", value: "no" }
                ]
            },
            {
                id: 6,
                text: "How soon do you want to start your treatment?",
                options: [
                    { label: "Immediately", value: "now" },
                    { label: "Within 1-3 months", value: "soon" },
                    { label: "Just exploring for now", value: "research" }
                ]
            }
        ];

        const App = () => {
            const [step, setStep] = useState(0); 
            const [answers, setAnswers] = useState({});
            const [isFinished, setIsFinished] = useState(false);
            const [result, setResult] = useState(null);

            const handleStart = () => setStep(1);

            const handleAnswer = (questionId, value) => {
                setAnswers(prev => ({ ...prev, [questionId]: value }));
                if (step < questions.length) {
                    setStep(step + 1);
                } else {
                    calculateResult();
                }
            };

            const calculateResult = () => {
                const results = {
                    title: "",
                    description: "",
                    cta: "Book Free Consultation",
                    link: "booking.html",
                    treatment: ""
                };

                const primary = answers[1];
                const missingPermanent = answers[4];
                const confidence = parseInt(answers[3]);

                if (primary === 'missing' || missingPermanent === 'yes') {
                    results.treatment = "Dental Implants";
                    results.title = "A Permanent, Natural Solution";
                    results.description = "Since you're looking for a permanent solution for missing teeth, Dental Implants are the gold standard. They look, feel, and function like real teeth.";
                    results.link = "implants.html";
                } else if (primary === 'gaps' || primary === 'crowding') {
                    results.treatment = "Clear Aligners";
                    results.title = "Discreet Smile Alignment";
                    results.description = "Your alignment concerns are best addressed with Clear Aligners. Achieve a perfect smile without the visibility or discomfort of metal braces.";
                    results.link = "aligners.html";
                } else {
                    results.treatment = "Smile Designing";
                    results.title = "The Ultimate Aesthetic Makeover";
                    results.description = "Based on your confidence score and color concerns, our Digital Smile Design workflow will create a celebrity-grade transformation tailored to you.";
                    results.link = "smile-designing.html";
                }

                setResult(results);
                setIsFinished(true);
            };

            if (step === 0) {
                return (
                    <div className="glass-card rounded-[40px] p-8 md:p-14 shadow-2xl text-center fade-in">
                        <div className="mb-8 flex justify-center">
                            <div className="w-16 h-16 bg-[#3E7A52] rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg shadow-emerald-200">✨</div>
                        </div>
                        <h1 className="text-4xl md:text-5xl font-serif font-bold text-[#1E3D26] mb-6">
                            Start Your <span className="italic text-[#3E7A52]">Smile Journey</span>
                        </h1>
                        <p className="text-gray-500 mb-10 text-lg max-w-md mx-auto">
                            Take our 2-minute assessment to find the best treatment plan for your unique dental needs.
                        </p>
                        <button 
                            onClick={handleStart}
                            className="btn-p w-full md:w-auto px-12 py-5 rounded-2xl font-bold text-lg shadow-xl shadow-emerald-900/10 active:scale-95"
                        >
                            Begin Assessment
                        </button>
                    </div>
                );
            }

            if (isFinished) {
                return (
                    <div className="glass-card rounded-[40px] p-8 md:p-14 shadow-2xl fade-in">
                        <div className="text-center mb-12">
                            <div className="text-6xl mb-6">🏥</div>
                            <p className="text-xs font-bold text-[#3E7A52] uppercase tracking-[0.3em] mb-3">Your Personalized Result</p>
                            <h1 className="text-3xl md:text-4xl font-serif font-bold text-[#1E3D26]">{result.title}</h1>
                        </div>
                        
                        <div className="bg-emerald-50/50 rounded-3xl p-8 mb-10 border border-emerald-100 flex flex-col md:flex-row gap-6 items-center">
                            <div className="flex-1">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Recommended Treatment</h3>
                                <div className="text-2xl font-bold text-[#1E3D26]">{result.treatment}</div>
                                <p className="mt-3 text-gray-600 leading-relaxed text-sm">
                                    {result.description}
                                </p>
                            </div>
                            <div className="w-px h-16 bg-emerald-100 hidden md:block"></div>
                            <div className="flex flex-col items-center">
                                <div className="text-3xl font-bold text-[#C9A24A]">98%</div>
                                <div className="text-[10px] text-gray-400 font-bold uppercase">Match</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <a href={result.link} className="btn-p py-5 rounded-2xl font-bold text-center block text-lg shadow-lg">
                                View Treatment Details
                            </a>
                            <a href="booking.html" className="bg-white border-2 border-gray-100 py-5 rounded-2xl font-bold text-center block text-[#1E3D26] hover:border-[#3E7A52] transition-all">
                                Book Free Consultation
                            </a>
                        </div>

                        <button 
                            onClick={() => { setStep(0); setIsFinished(false); setAnswers({}); }}
                            className="mt-10 text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-red-500 transition-colors block mx-auto"
                        >
                            ↻ Retake Assessment
                        </button>
                    </div>
                );
            }

            const currentQuestion = questions[step - 1];
            const progress = (step / questions.length) * 100;

            return (
                <div className="glass-card rounded-[40px] p-8 md:p-14 shadow-2xl fade-in min-h-[500px] flex flex-col">
                    <div className="flex items-center justify-between mb-12">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-1">Step {step} of {questions.length}</span>
                            <span className="text-xs font-bold text-[#3E7A52]">Progress Assessment</span>
                        </div>
                        <div className="w-24 md:w-40 progress-bar">
                            <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>

                    <h2 className="text-2xl md:text-3xl font-serif font-bold text-[#1E3D26] mb-10 leading-tight">
                        {currentQuestion.text}
                    </h2>

                    <div className="space-y-4 flex-1">
                        {currentQuestion.type === 'scale' ? (
                            <div className="py-14">
                                <input 
                                    type="range" 
                                    min={currentQuestion.min} 
                                    max={currentQuestion.max} 
                                    defaultValue={5}
                                    className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#3E7A52]"
                                    onMouseUp={(e) => handleAnswer(currentQuestion.id, e.target.value)}
                                    onTouchEnd={(e) => handleAnswer(currentQuestion.id, e.target.value)}
                                />
                                <div className="flex justify-between mt-6 px-1">
                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{currentQuestion.labels[0]}</span>
                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{currentQuestion.labels[1]}</span>
                                </div>
                            </div>
                        ) : (
                            currentQuestion.options.map((opt, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => handleAnswer(currentQuestion.id, opt.value)}
                                    className="w-full text-left p-6 rounded-2xl border-2 border-gray-100 hover:border-[#3E7A52] hover:bg-emerald-50/50 transition-all group flex items-center gap-4 bg-white/50"
                                >
                                    {opt.icon && <span className="text-3xl group-hover:scale-110 transition-transform">{opt.icon}</span>}
                                    <span className="font-semibold text-gray-700 text-lg">{opt.label}</span>
                                    <span className="ml-auto bg-emerald-50 w-8 h-8 rounded-full flex items-center justify-center text-[#3E7A52] opacity-0 group-hover:opacity-100 transition-all transform translate-x-2 group-hover:translate-x-0">
                                        →
                                    </span>
                                </button>
                            ))
                        )}
                    </div>

                    <div className="mt-12 flex justify-between items-center">
                        <button 
                            onClick={() => setStep(step - 1)}
                            className={`text-gray-400 hover:text-[#1E3D26] font-bold text-xs uppercase tracking-widest transition-colors ${step === 1 ? 'invisible' : ''}`}
                        >
                            ← Previous
                        </button>
                        <div className="flex gap-1">
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className={`w-1.5 h-1.5 rounded-full ${i === step ? 'bg-[#3E7A52]' : 'bg-gray-200'}`}></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
